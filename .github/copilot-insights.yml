# Gate Keeper — Copilot Workspace Insights
#
# This file enables GitHub Copilot to use gate-keeper's knowledge graph when
# answering workspace-aware questions. The "graph-tools" participant responds
# to architecture, impact, and dependency queries using the gate-keeper MCP
# server's deterministic graph algorithms (no LLM — purely graph queries).
#
# To activate:
#   1. Start the gate-keeper daemon (npm run daemon | npm run dev)
#   2. The gate-keeper MCP server (npm run mcp) exposes 27 tools on stdio
#   3. Copilot automatically discovers MCP servers listed in .vscode/mcp.json

version: 1
participants:
  - name: graph-tools
    description: |
      Gate Keeper knowledge graph — answers queries about codebase architecture,
      dependency impact, file quality, and module coupling using the dependency
      graph. Returns token-efficient structured data instead of reading raw files.
    instructions: |
      ## Available Tools (gate-keeper MCP server)

      ### Pre-edit safety (call BEFORE editing any file)
      - `check_pre_edit_safety(file_path)` — returns safe/warn/block verdict
      - `get_impact_set(file_path, depth=2)` — which files are affected by a change
      - `summarize_file(file_path)` — structured file overview (rating, imports, dependents) without reading the file

      ### Architecture understanding (call once per session)
      - `get_graph_report()` — narrative report with god nodes, surprising connections, suggested questions
      - `get_centrality_rank(limit=10)` — most-connected files (highest blast radius)
      - `query_graph(query)` — natural language queries: "what would break if X changed?", "what connects X to Y?"

      ### Refactoring safety (call before rename/delete)
      - `find_callers(symbol_name)` — all call sites for a function across the codebase
      - `trace_path(source, target)` — shortest dependency path between two files
      - `explain_node(file_path)` — deep explanation of a node's role in the architecture

      ### Token efficiency metrics
      - `get_session_metrics()` — cumulative token savings (graph queries vs. reading raw files)

    suggestedPrompts:
      - title: "Impact of changing a file"
        prompt: "What would break if I edit src/auth/service.ts? check pre-edit safety and show affected files"
      - title: "God nodes (most critical files)"
        prompt: "Which files have the highest blast radius? run get_graph_report and list god nodes"
      - title: "Cross-module dependencies"
        prompt: "Are there any surprising connections between modules in this codebase?"
      - title: "File quality overview"
        prompt: "Summarize the quality of my 5 worst-rated files using get_centrality_rank and suggest refactoring"
      - title: "Function rename safety"
        prompt: "Find all callers of the login function and trace the dependency path from auth to database"
